[description]
en = "In robotics, semantic scene understanding (SSU) refers to the interpretation of visual scenes to support downstream robot tasks. It involves extracting high-level information from images, videos, point clouds, and natural language, and building contextual correspondences between elements. We tackle scene graph generation, semantic rearrangement, grasping, mapping, active SLAM, and change detection. Our goal is to endow robots with human-level perception and reasoning for real-world applications — closely aligned with the concept of Embodied AI."
zh = "在机器人学中，语义场景理解（SSU）指对视觉场景的解释与理解，以支持下游机器人任务。它涉及从图像、视频、点云和自然语言中提取高层语义信息，并建立元素之间的上下文对应关系。我们专注于场景图生成、语义重排、语义抓取、语义建图、主动 SLAM 和变化检测等问题。我们的目标是赋予机器人接近人类水平的感知与推理能力，并将 SSU 算法落地到真实机器人应用中——与具身 AI（Embodied AI）的理念高度契合。"

